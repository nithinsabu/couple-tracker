<!DOCTYPE html>
<html>
<head>
  <title>Couple Tracker 💙</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    nav a { margin-right: 10px; cursor: pointer; }
    textarea { width: 100%; height: 80px; }
    .hidden { display: none; }
    button { margin-top: 10px; padding: 8px; }
  </style>
</head>
<body>

<nav>
  <a onclick="go('today')">Today</a>
  <a onclick="go('history')">History</a>
</nav>

<div id="userSelect">
  <h2>Who are you?</h2>
  <button onclick="setUser('nithin')">Nithin</button>
  <button onclick="setUser('aiswarya')">Aiswarya</button>
</div>

<!-- TODAY PAGE -->
<div id="todayPage" class="hidden">
  <h2>Daily Check-In</h2>

  <label>Rate yourself</label>
  <input type="range" min="0" max="10" id="self"><br>

  <label id="partnerLabel"></label>
  <input type="range" min="0" max="10" id="partner"><br>

  <label>External circumstances</label>
  <input type="range" min="0" max="10" id="external"><br><br>

  <textarea id="note" placeholder="How do you feel today?"></textarea><br>

  <button onclick="submitEntry()">Submit</button>

  <h3>Status</h3>
  <div id="status"></div>
</div>

<!-- HISTORY PAGE -->
<div id="historyPage" class="hidden">
  <h2>History</h2>

  <select id="historyUser">
    <option value="nithin">Nithin</option>
    <option value="aiswarya">Aiswarya</option>
  </select>

  <select id="sortBy">
    <option value="date">Date</option>
    <option value="self">Self</option>
    <option value="partner">Partner</option>
    <option value="external">External</option>
  </select>

  <button onclick="loadHistory()">Load</button>

  <ul id="historyList"></ul>
</div>

<script>
let currentUser = localStorage.getItem("user") || null;
let data = { entries: [] };

// ---------- INIT ----------
init();

async function init() {
  await loadInitialData();
  if (currentUser) showPage('today');
}

// ---------- DATA ----------
async function loadInitialData() {
  const saved = localStorage.getItem("data");
  if (saved) {
    data = JSON.parse(saved);
  } else {
    try {
      const res = await fetch("data.json");
      data = await res.json();
      saveData();
    } catch {
      data = { entries: [] };
    }
  }
}

function saveData() {
  localStorage.setItem("data", JSON.stringify(data));
}

// ---------- USER ----------
function setUser(user) {
  currentUser = user;
  localStorage.setItem("user", user);
  showPage('today');
}

// ---------- NAV ----------
function go(page) {
  if (!currentUser) return alert("Select user first");
  showPage(page);
}

function showPage(page) {
  document.getElementById("userSelect").style.display = currentUser ? "none" : "block";
  document.getElementById("todayPage").classList.add("hidden");
  document.getElementById("historyPage").classList.add("hidden");

  if (page === "today") {
    document.getElementById("todayPage").classList.remove("hidden");
    loadToday();
  }
  if (page === "history") {
    document.getElementById("historyPage").classList.remove("hidden");
  }
}

// ---------- TODAY ----------
function getToday() {
  return new Date().toISOString().split("T")[0];
}

function getOtherUser() {
  return currentUser === "nithin" ? "aiswarya" : "nithin";
}

function loadToday() {
  const other = getOtherUser();
  document.getElementById("partnerLabel").innerText = `Rate ${capitalize(other)}`;

  let entry = data.entries.find(e => e.date === getToday());

  if (!entry) {
    entry = {
      date: getToday(),
      nithin: { submitted: false },
      aiswarya: { submitted: false }
    };
    data.entries.push(entry);
    saveData();
  }

  renderStatus(entry);
}

function submitEntry() {
  const today = getToday();
  let entry = data.entries.find(e => e.date === today);

  entry[currentUser] = {
    submitted: true,
    self: +document.getElementById("self").value,
    partner: +document.getElementById("partner").value,
    external: +document.getElementById("external").value,
    note: document.getElementById("note").value
  };

  saveData();
  renderStatus(entry);
}

function renderStatus(entry) {
  const other = getOtherUser();
  const status = document.getElementById("status");

  if (!entry[other].submitted) {
    status.innerText = `${capitalize(other)} has not written today`;
  } else {
    status.innerHTML = `
      <b>Your Entry:</b><br>
      ${entry[currentUser].note}<br><br>

      <b>${capitalize(other)}'s Entry:</b><br>
      ${entry[other].note}
    `;
  }
}

// ---------- HISTORY ----------
function loadHistory() {
  const user = document.getElementById("historyUser").value;
  const sortBy = document.getElementById("sortBy").value;

  let entries = data.entries.filter(e => e[user].submitted);

  entries.sort((a, b) => {
    if (sortBy === "date") return new Date(b.date) - new Date(a.date);
    return (b[user][sortBy] || 0) - (a[user][sortBy] || 0);
  });

  const list = document.getElementById("historyList");
  list.innerHTML = "";

  entries.forEach(e => {
    const li = document.createElement("li");
    li.innerText = `${e.date} | Self:${e[user].self} Partner:${e[user].partner} External:${e[user].external}`;
    list.appendChild(li);
  });
}

// ---------- UTIL ----------
function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}
</script>

</body>
</html>
